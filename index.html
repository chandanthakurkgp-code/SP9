<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUPERINTENDENT OF POLICE – Paschim Medinipur</title>
    <style>
        * { box-sizing: border-box; transition: background 0.2s, color 0.2s; }
        
        :root { 
            --police-blue: #FF6600;   
            --light-green: #2ecc71;   
            --green-shadow: #27ae60;  
            --dark-bg: #1a1a1a; 
            --white-bg: #ffffff; 
            --text-color: #000000;
            --card-text-mute: #555555; 
            --card-bg: #ffffff;
            --btn-blue: #d32f2f;      
            --btn-orange: #FF9933;   
            --status-on: #4cd137;
            --status-off: #7f8c8d;
            --status-absent: #c23616;
        }

        body.night-mode {
            --white-bg: #121212;
            --text-color: #ffffff;
            --card-text-mute: #dddddd; 
            --card-bg: #1e1e1e;
            --dark-bg: #000000;
        }
        body.night-mode .post-input {
            color: #ffffff !important;
            background-color: #333333 !important;
        }
        
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            margin: 0; padding: 0; 
            background-color: var(--white-bg); 
            color: var(--text-color);
            overflow-x: hidden; 
            -webkit-font-smoothing: antialiased;
        }

        .main-header { 
            text-align: center; 
            background-color: var(--police-blue); 
            padding: 25px 10px 15px 10px; 
            color: #ffffff; 
            border-bottom: 4px solid #cc5200;
        }
        .main-title { font-size: clamp(24px, 6vw, 40px); font-weight: 900; margin: 0; text-transform: uppercase; }

        .top-actions {
            background: var(--dark-bg); padding: 15px 10px;
            display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; 
        }
        
        .mode-btn, .links-btn { 
            padding: 12px 10px; border-radius: 10px; font-weight: 900; border: none; cursor: pointer;
            font-size: 12px; min-width: 100px; flex: 1; max-width: 150px; text-align: center; text-transform: uppercase;
        }
        .mode-btn { background-color: var(--light-green); color: #fff; box-shadow: 0 4px 0 var(--green-shadow); }
        .links-btn.blue { background-color: var(--btn-blue); box-shadow: 0 4px 0 #9a1f1f; color: white; }
        .links-btn.orange { background-color: var(--btn-orange); box-shadow: 0 4px 0 #cc7a29; color: white; }

        .attendance-panel {
            background: var(--dark-bg); padding: 20px 15px; text-align: center;
            border-bottom: 3px solid var(--light-green);
        }
        .attendance-box {
            background: var(--card-bg); max-width: 600px; margin: 0 auto; padding: 20px;
            border-radius: 20px; border: 4px solid var(--police-blue); box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .post-input {
            width: 85%; padding: 12px; border-radius: 50px;
            border: 2px solid var(--police-blue); font-size: 15px;
            text-align: center; margin-bottom: 12px; outline: none; color: var(--text-color);
            background: #ffffff;
        }
        .duty-master-btn {
            width: 85%; padding: 14px; font-size: 16px; font-weight: 900;
            color: white; border: none; border-radius: 50px; cursor: pointer;
            box-shadow: 0 4px 0 #9a1f1f; text-transform: uppercase; margin-bottom: 10px;
        }
        .duty-master-btn.join { background-color: #4cd137; box-shadow: 0 4px 0 #389526; }
        .duty-master-btn.leave { background-color: #c23616; box-shadow: 0 4px 0 #8c260f; }
        
        .download-report-btn {
            width: 85%; padding: 12px; font-size: 14px; font-weight: 900;
            background-color: var(--light-green); color: white; border: none; border-radius: 50px; cursor: pointer;
            box-shadow: 0 4px 0 var(--green-shadow); text-transform: uppercase; display: inline-block;
        }

        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 99999; padding: 20px;
        }
        .modal-content {
            background: var(--card-bg); color: var(--text-color); max-width: 500px;
            margin: 40px auto; padding: 20px; border-radius: 20px; border: 5px solid var(--light-green);
        }
        .link-item {
            display: block; background: var(--light-green); color: #fff; padding: 15px;
            margin: 10px 0; text-decoration: none; text-align: center; font-weight: bold;
            border-radius: 10px; box-shadow: 0 3px 0 var(--green-shadow);
        }

        .search-container { background: var(--dark-bg); padding: 0 15px 15px 15px; border-bottom: 3px solid var(--light-green); }
        .global-search-bar { width: 100%; max-width: 600px; padding: 15px; border-radius: 50px; border: 3px solid var(--light-green); font-size: 18px; display: block; margin: 0 auto; outline: none; background: #ffffff; }

        .nav-container { 
            background-color: var(--dark-bg); padding: 15px 0; position: sticky; top: 0; z-index: 1000; 
            display: flex; gap: 10px; border-bottom: 4px solid var(--light-green); overflow-x: auto; 
            padding-left: 10px; scrollbar-width: none; transform: translate3d(0, 0, 0); will-change: transform;
            -webkit-overflow-scrolling: touch; scroll-behavior: smooth; overscroll-behavior-x: contain; touch-action: pan-x;
        }
        .nav-container::-webkit-scrollbar { display: none; }
        
        .tab-btn { 
            font-size: 14px; padding: 10px 20px; font-weight: 900; cursor: pointer; 
            border-radius: 50px; background-color: var(--light-green); color: #fff; 
            border: none; white-space: nowrap; box-shadow: 0 4px 0 var(--green-shadow);
            transition: none !important; will-change: transform;
        }
        .tab-btn.active { background-color: #ffffff !important; color: #000000 !important; transform: translateY(3px); box-shadow: 0 2px 0 var(--green-shadow); }

        .container { padding: 15px; max-width: 1100px; margin: auto; padding-bottom: 120px; }
        .section { display: none; }
        .section.active { display: block; }
        
        .list-card { background: var(--card-bg); padding: 20px; border-radius: 20px; border: 5px solid var(--light-green); margin-bottom: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); color: var(--text-color); position: relative; }
        .list-card p { color: var(--card-text-mute); margin: 8px 0; }
        .list-card p b { color: var(--text-color); }
        
        .status-badge { position: absolute; top: 15px; right: 15px; padding: 5px 12px; border-radius: 50px; font-size: 11px; font-weight: 900; color: white; text-transform: uppercase; }
        .status-badge.on { background-color: var(--status-on); }
        .status-badge.off { background-color: var(--status-off); }
        .status-badge.absent { background-color: var(--status-absent); }

        .ps-header {
            background-color: var(--light-green); color: #ffffff; padding: 15px;
            margin-bottom: 10px; border-radius: 15px; cursor: pointer; font-weight: 900;
            display: flex; justify-content: space-between; align-items: center; border: 2px solid var(--light-green);
        }
        .ps-content { display: none; padding-top: 10px; }
        .ps-content.open { display: block; }

        .btn-group { display: grid; grid-template-columns: repeat(auto-fit, minmax(90px, 1fr)); gap: 8px; margin-top: 15px; }
        .action-btn { padding: 12px 5px; text-decoration: none; color: #fff; border-radius: 50px; text-align: center; font-weight: 900; background-color: var(--light-green); border: none; font-size: 11px; box-shadow: 0 3px 0 var(--green-shadow); }
        
        .zoom-controls { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 4000; }
        .zoom-btn { width: 50px; height: 50px; border-radius: 50%; background-color: var(--light-green); border: 3px solid var(--green-shadow); font-size: 24px; font-weight: 900; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .home-btn { background-color: var(--btn-blue); border-color: #9a1f1f; color: white; box-shadow: 0 4px 0 #9a1f1f; }
    </style>
</head>
<body>

<div class="main-header">
    <h1 class="main-title">SUPERINTENDENT OF POLICE</h1>
    <div class="main-subtitle">PASCHIM MEDINIPUR</div>
</div>

<div class="top-actions">
    <button class="mode-btn" onclick="toggleNightMode()" id="modeBtn">🌙 NIGHT MODE</button>
    <button class="links-btn blue" onclick="toggleModal('quickLinksModal')">🌐 QUICK LINKS</button>
    <button class="links-btn orange" onclick="toggleModal('importantLinksModal')">📌 IMPORTANT SITES</button>
</div>

<!-- लाइव अटेंडेंस पैनल -->
<div class="attendance-panel">
    <div class="attendance-box">
        <h3 style="margin-top:0; color:var(--police-blue);">🚨 LIVE ATTENDANCE (हाजिरी दर्ज करें)</h3>
        
        <div id="dutyFormArea">
            <input type="text" id="dutyUserName" class="post-input" placeholder="अपना सही नाम टाइप करें...">
            <input type="text" id="dutyPostName" class="post-input" placeholder="ड्यूटी पोस्ट/स्थान का नाम लिखें...">
            <button class="duty-master-btn join" onclick="handleDutyAction('join')">🚨 JOIN DUTY</button>
        </div>
        
        <div id="leaveFormArea" style="display:none;">
            <p id="activeDutyStatus" style="font-weight:bold; color:#4cd137;"></p>
            <button class="duty-master-btn leave" onclick="handleDutyAction('leave')">🛑 LEAVE DUTY (ड्यूटी समाप्त)</button>
        </div>
        
        <button class="download-report-btn" onclick="downloadMonthlyCSVReport()">📊 DOWNLOAD MONTHLY REPORT</button>
        
        <p id="gpsStatus" style="font-size:12px; color:#7f8c8d; margin-top:10px; margin-bottom:0; font-weight:bold;"></p>
    </div>
</div>

<div id="quickLinksModal" class="modal">
    <div class="modal-content">
        <h2 style="text-align:center; margin-top:0;">🌐 Quick Links</h2><hr>
        <a href="https://wmdppolicekhoj.co.in/" target="_blank" class="link-item">Khoj (Police Dept)</a>
        <button onclick="toggleModal('quickLinksModal')" style="width:100%; padding:12px; background:#d32f2f; color:white; border:none; border-radius:50px; margin-top:15px; font-weight:bold;">CLOSE</button>
    </div>
</div>

<div id="importantLinksModal" class="modal">
    <div class="modal-content">
        <h2 style="text-align:center; margin-top:0;">📌 Important Sites</h2><hr>
        <a href="https://westbengalpolice.gov.in/" target="_blank" class="link-item">West Bengal Police</a>
        <button onclick="toggleModal('importantLinksModal')" style="width:100%; padding:12px; background:#d32f2f; color:white; border:none; border-radius:50px; margin-top:15px; font-weight:bold;">CLOSE</button>
    </div>
</div>

<div class="search-container">
    <input type="text" id="globalSearch" class="global-search-bar" placeholder="खोजें...">
</div>

<div class="nav-container" id="tabMenu"></div>
<div class="container" id="contentArea"></div>

<div class="zoom-controls">
    <button class="zoom-btn home-btn" onclick="goHome()">🏠</button>
    <button class="zoom-btn" onclick="changeZoom(0.1)">+</button>
    <button class="zoom-btn" onclick="changeZoom(-0.1)">−</button>
</div>

<script>
    const GOOGLE_SHEET_ID = "1dQW0F83Sn9hCOqVRSkIvtReOu31oh9tM0dF6cSNfyl0"; 

    let rawDataList = []; 
    let activeDutyUser = null; 

    let shopData = {
        "asp": { title: "ASP", partners: [] },
        "sdpo": { title: "SDPO", partners: [] },
        "dysp": { title: "DySP", partners: [] },
        "ci": { title: "CI", partners: [] },
        "police_stations": { title: "IC & OC", partners: [] },
        "si_asi": { title: "SI & ASI", partners: [] },
        "constable": { title: "CONSTABLE", partners: [] },
        "nvf": { title: "NVF", partners: [] },
        "hg": { title: "HG", partners: [] },
        "cv": { title: "CV", partners: [] }
    };

    const stationGroupKeys = ["police_stations", "si_asi", "constable", "nvf", "hg", "cv"];

    window.onload = function() {
        const savedTheme = localStorage.getItem('theme');
        if(savedTheme === 'night') {
            document.body.classList.add('night-mode');
            updateModeButton(true);
        }
        loadGoogleSheetDirectly();
        
        const savedActiveUser = localStorage.getItem('activeDutyUser');
        if(savedActiveUser) {
            activeDutyUser = savedActiveUser;
            document.getElementById('dutyFormArea').style.display = "none";
            document.getElementById('leaveFormArea').style.display = "block";
            document.getElementById('activeDutyStatus').innerText = `✅ आप वर्तमान में "${savedActiveUser}" के नाम से ऑन-ड्यूटी हैं।`;
        }
    };

    function getIndianISTDateTime() {
        let dateObj = new Date();
        let dateOptions = { timeZone: 'Asia/Kolkata', day: '2-digit', month: '2-digit', year: 'numeric' };
        let timeOptions = { timeZone: 'Asia/Kolkata', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true };
        
        let dateString = dateObj.toLocaleDateString('en-GB', dateOptions); 
        let timeString = dateObj.toLocaleTimeString('en-US', timeOptions); 
        
        return `${dateString} | ${timeString}`;
    }

    // 🎯 कुल सेकंड्स को Hrs: 00h:00m:00s में पार्स करने का नया स्मार्ट इंजन
    function parseSecondsToHMS(totalSeconds) {
        let hrs = Math.floor(totalSeconds / 3600);
        let mins = Math.floor((totalSeconds % 3600) / 60);
        let secs = totalSeconds % 60;
        return `${hrs}h:${mins}m:${secs}s`;
    }

    function loadGoogleSheetDirectly() {
        const url = `https://docs.google.com/spreadsheets/d/${GOOGLE_SHEET_ID}/export?format=csv&gid=0&v=` + Date.now();

        fetch(url)
        .then(response => response.text())
        .then(text => {
            let cleanText = text.replace(/\r/g, ""); 
            let lines = cleanText.split("\n");
            if (lines.length === 0 || !lines[0].trim()) return;

            let headers = lines[0].split(',').map(h => h.trim().toLowerCase().replace(/^["']|["']$/g, ""));
            
            let typeIdx = headers.indexOf('type');
            let psNameIdx = headers.indexOf('ps_name');
            let forceTypeIdx = headers.indexOf('force_type');
            let nameIdx = headers.indexOf('name');
            let rankIdx = headers.indexOf('rank');
            let mobileIdx = headers.indexOf('mobile');
            let landlineIdx = headers.indexOf('landline');
            let whatsappIdx = headers.indexOf('whatsapp');
            
            let statusIdx = headers.indexOf('status');
            let postIdx = headers.indexOf('duty_post');
            let inTimeIdx = headers.indexOf('in_time');
            let outTimeIdx = headers.indexOf('out_time');
            let inGpsIdx = headers.indexOf('in_gps');
            let outGpsIdx = headers.indexOf('out_gps');
            let summaryIdx = headers.indexOf('summary');

            rawDataList = []; 

            for(let i = 1; i < lines.length; i++) {
                if(!lines[i].trim()) continue;
                let cols = lines[i].split(',').map(c => c.trim().replace(/^["']|["']$/g, ""));
                
                let pName = nameIdx !== -1 && cols[nameIdx] ? cols[nameIdx].trim() : 'N/A';
                
                let savedStatus = localStorage.getItem(`status_${pName}`) || (statusIdx !== -1 && cols[statusIdx] ? cols[statusIdx].trim() : 'Off-Duty');
                let savedPost = localStorage.getItem(`post_${pName}`) || (postIdx !== -1 && cols[postIdx] ? cols[postIdx].trim() : 'N/A');
                let savedInTime = localStorage.getItem(`inTime_${pName}`) || (inTimeIdx !== -1 && cols[inTimeIdx] ? cols[inTimeIdx].trim() : '');
                let savedOutTime = localStorage.getItem(`outTime_${pName}`) || (outTimeIdx !== -1 && cols[outTimeIdx] ? cols[outTimeIdx].trim() : '');
                let savedInGps = localStorage.getItem(`inGps_${pName}`) || (inGpsIdx !== -1 && cols[inGpsIdx] ? cols[inGpsIdx].trim() : '');
                let savedOutGps = localStorage.getItem(`outGps_${pName}`) || (outGpsIdx !== -1 && cols[outGpsIdx] ? cols[outGpsIdx].trim() : '');
                
                // डिफॉल्ट समरी में सेकंड्स '0s' को आधार बनाया गया है ताकि एरर न हो
                let savedSummary = localStorage.getItem(`summary_${pName}`) || (summaryIdx !== -1 && cols[summaryIdx] ? cols[summaryIdx].trim() : 'P:0 | A:0 | Hrs:0s');

                let obj = {
                    type: typeIdx !== -1 && cols[typeIdx] ? cols[typeIdx].trim().toLowerCase() : '',
                    ps_name: psNameIdx !== -1 && cols[psNameIdx] ? cols[psNameIdx].trim() : '',
                    force_type: forceTypeIdx !== -1 && cols[forceTypeIdx] ? cols[forceTypeIdx].trim() : 'Officer',
                    name: pName,
                    rank: rankIdx !== -1 && cols[rankIdx] ? cols[rankIdx].trim() : 'N/A',
                    mobile: mobileIdx !== -1 && cols[mobileIdx] ? cols[mobileIdx].trim() : 'N/A',
                    landline: landlineIdx !== -1 && cols[landlineIdx] ? cols[landlineIdx].trim() : '',
                    whatsapp: whatsappIdx !== -1 && cols[whatsappIdx] ? cols[whatsappIdx].trim() : '',
                    
                    status: savedStatus,
                    duty_post: savedPost,
                    in_time: savedInTime,
                    out_time: savedOutTime,
                    in_gps: savedInGps,
                    out_gps: savedOutGps,
                    summary: savedSummary
                };

                rawDataList.push(obj);
            }

            buildDynamicUI();
        })
        .catch(err => console.error("डेटा लोड करने में समस्या आई।", err));
    }

    function handleDutyAction(actionType) {
        const statusField = document.getElementById('gpsStatus');
        statusField.innerText = "🌐 कृपया प्रतीक्षा करें, आपका सटीक GPS लोकेशन कैप्चर किया जा रहा है...";

        if (!navigator.geolocation) {
            executeAttendanceLogic(actionType, "GPS Not Supported");
            return;
        }

        navigator.geolocation.getCurrentPosition((position) => {
            let lat = position.coords.latitude.toFixed(6);
            let lon = position.coords.longitude.toFixed(6);
            let gpsCoords = `${lat}, ${lon}`;
            executeAttendanceLogic(actionType, gpsCoords);
        }, (error) => {
            executeAttendanceLogic(actionType, "GPS Off/Denied");
        }, { enableHighAccuracy: true, timeout: 6000 }); 
    }

    function executeAttendanceLogic(actionType, gpsOutput) {
        const statusField = document.getElementById('gpsStatus');
        let currentDateTime = getIndianISTDateTime();
        let currentDateOnly = currentDateTime.split("|")[0].trim(); 

        if (actionType === 'join') {
            let nameInput = document.getElementById('dutyUserName').value.trim();
            let postInput = document.getElementById('dutyPostName').value.trim();
            
            if (!nameInput || !postInput) {
                alert("कृपया अपना नाम और ड्यूटी स्थान दोनों भरें!");
                statusField.innerText = "";
                return;
            }

            let matchedUser = rawDataList.find(u => u.name.toLowerCase().includes(nameInput.toLowerCase()));

            if (!matchedUser) {
                alert("⚠️ दर्ज किया गया नाम रिकॉर्ड में नहीं मिला।");
                statusField.innerText = "";
                return;
            }

            let uName = matchedUser.name;
            let lastJoinDate = localStorage.getItem(`lastJoinDate_${uName}`);
            if (lastJoinDate === currentDateOnly) {
                alert(`⚠️ आप आज (${currentDateOnly}) की हाजिरी पहले ही दर्ज कर चुके हैं!\nदिन में केवल एक बार ही ड्यूटी जॉइन की जा सकती है।`);
                statusField.innerText = "";
                return;
            }

            matchedUser.status = "On-Duty";
            matchedUser.duty_post = postInput;
            matchedUser.in_time = currentDateTime;
            matchedUser.in_gps = gpsOutput;

            let parts = matchedUser.summary.split('|').map(p => p.trim());
            let pCount = parseInt(parts[0].split(':')[1]) + 1;
            let aCount = parseInt(parts[1].split(':')[1]);
            
            // पुरानी समरी से सेकंड्स को सही ढंग से बचाकर रखना
            let rawHrsString = parts[2].split(':')[1].trim();
            let oldSeconds = parseInt(rawHrsString) || 0;

            matchedUser.summary = `P:${pCount} | A:${aCount} | Hrs:${oldSeconds}s`;

            // लोकल स्टोरेज टाइमस्टैम्प सेव करना गणना को सटीक रखने के लिए
            localStorage.setItem(`timestamp_join_${uName}`, Date.now().toString());

            localStorage.setItem(`status_${uName}`, "On-Duty");
            localStorage.setItem(`post_${uName}`, postInput);
            localStorage.setItem(`inTime_${uName}`, currentDateTime);
            localStorage.setItem(`inGps_${uName}`, gpsOutput);
            localStorage.setItem(`summary_${uName}`, matchedUser.summary);
            localStorage.setItem(`lastJoinDate_${uName}`, currentDateOnly); 

            activeDutyUser = matchedUser.name;
            localStorage.setItem('activeDutyUser', matchedUser.name);

            document.getElementById('dutyFormArea').style.display = "none";
            document.getElementById('leaveFormArea').style.display = "block";
            document.getElementById('activeDutyStatus').innerText = `✅ आप वर्तमान में "${matchedUser.name}" के नाम से ऑन-ड्यूटी हैं।`;

            alert(`🚨 जय हिन्द, ड्यूटी सफलतापूर्वक जॉइन की गई!\n🕒 IST समय: ${currentDateTime}`);
        } else if (actionType === 'leave') {
            let matchedUser = rawDataList.find(u => u.name.toLowerCase() === activeDutyUser.toLowerCase());

            if (matchedUser) {
                let uName = matchedUser.name;
                let elapsedSeconds = 28800; // फॉलबैक सुरक्षा के लिए 8 घंटे (28800 सेकंड्स) डिफॉल्ट

                let joinTimestampStr = localStorage.getItem(`timestamp_join_${uName}`);
                if (joinTimestampStr) {
                    let diffMs = Date.now() - parseInt(joinTimestampStr);
                    elapsedSeconds = Math.floor(diffMs / 1000); // ⏱️ सटीक सेकंड्स गणना हुई
                }
                
                matchedUser.status = "Off-Duty";
                matchedUser.out_time = currentDateTime;
                matchedUser.out_gps = gpsOutput;

                let parts = matchedUser.summary.split('|').map(p => p.trim());
                let pCount = parseInt(parts[0].split(':')[1]);
                let aCount = parseInt(parts[1].split(':')[1]);
                
                let rawHrsString = parts[2].split(':')[1].trim();
                let oldSeconds = parseInt(rawHrsString) || 0;
                let newTotalSeconds = oldSeconds + elapsedSeconds; // 🎯 सेकंड्स आपस में प्लस हुए

                matchedUser.summary = `P:${pCount} | A:${aCount} | Hrs:${newTotalSeconds}s`;

                localStorage.setItem(`status_${uName}`, "Off-Duty");
                localStorage.setItem(`outTime_${uName}`, currentDateTime);
                localStorage.setItem(`outGps_${uName}`, gpsOutput);
                localStorage.setItem(`summary_${uName}`, matchedUser.summary);
                localStorage.removeItem(`timestamp_join_${uName}`);
            }

            localStorage.removeItem('activeDutyUser');
            activeDutyUser = null;

            document.getElementById('dutyFormArea').style.display = "block";
            document.getElementById('leaveFormArea').style.display = "none";
            document.getElementById('dutyUserName').value = "";
            document.getElementById('dutyPostName').value = "";

            alert(`🛑 ड्यूटी सफलतापूर्वक समाप्त!`);
        }

        statusField.innerText = "✅ डेटा परमानेंट मेमोरी में सुरक्षित सहेज लिया गया है।";
        buildDynamicUI(); 
    }

    function downloadMonthlyCSVReport() {
        if(rawDataList.length === 0) {
            alert("डाउनलोड करने के लिए कोई डेटा उपलब्ध नहीं है!");
            return;
        }

        let csvContent = "data:text/csv;charset=utf-8,";
        csvContent += "Name,Rank,Police Station,Force Type,Current Status,Duty Post,Join Time (IST),Leave Time (IST),Join GPS,Leave GPS,Attendance Summary (P|A|Hrs)\n";
        
        rawDataList.forEach(p => {
            let summaryParts = p.summary.split('|').map(x => x.trim());
            let totalSeconds = parseInt(summaryParts[2].split(':')[1]) || 0;
            let formattedReportTime = parseSecondsToHMS(totalSeconds); // CSV रिपोर्ट में भी H:M:S दिखेगा
            let readableSummary = `${summaryParts[0]} | ${summaryParts[1]} | Hrs:${formattedReportTime}`;

            let row = [
                `"${p.name}"`,
                `"${p.rank}"`,
                `"${p.ps_name}"`,
                `"${p.force_type}"`,
                `"${p.status}"`,
                `"${p.duty_post}"`,
                `"${p.in_time}"`,
                `"${p.out_time}"`,
                `"${p.in_gps}"`,
                `"${p.out_gps}"`,
                `"${readableSummary}"`
            ].join(",");
            csvContent += row + "\n";
        });
        
        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        
        let fileDate = new Date().toLocaleDateString('en-GB').replace(/\//g, "-");
        link.setAttribute("download", `Police_Monthly_Report_${fileDate}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    function buildDynamicUI() {
        Object.keys(shopData).forEach(key => shopData[key].partners = []);

        rawDataList.forEach(obj => {
            if(!obj.type) return;

            if (obj.type === "police_stations") {
                let forceKey = obj.force_type.toLowerCase().trim();
                if (forceKey === "si & asi") forceKey = "si_asi";
                
                if (forceKey === "officer") {
                    shopData["police_stations"].partners.push(obj);
                } else if (shopData[forceKey]) {
                    shopData[forceKey].partners.push(obj);
                }
            } else if(shopData[obj.type]) {
                shopData[obj.type].partners.push(obj);
            }
        });

        init();
    }

    function init() {
        stationGroupKeys.forEach(key => {
            if(shopData[key] && shopData[key].partners) {
                shopData[key].partners.sort((a, b) => a.ps_name.localeCompare(b.ps_name));
            }
        });
        
        const tabMenu = document.getElementById('tabMenu');
        const contentArea = document.getElementById('contentArea');
        
        tabMenu.innerHTML = "";
        contentArea.innerHTML = "";

        createTab("📂 DIRECTORY", "directory", true);
        Object.keys(shopData).forEach(key => createTab(shopData[key].title, key, false));

        const dirSection = document.createElement('div');
        dirSection.id = 'directory';
        dirSection.className = "section active";
        
        let allHtml = "";

        Object.keys(shopData).forEach(key => {
            if (shopData[key].partners.length === 0) return;

            const section = document.createElement('div');
            section.id = key;
            section.className = "section";
            let html = "";
            
            if (stationGroupKeys.includes(key)) {
                const grouped = {};
                shopData[key].partners.forEach(p => {
                    let psName = p.ps_name || 'Unknown';
                    if (!grouped[psName]) grouped[psName] = [];
                    grouped[psName].push(p);
                });
                Object.keys(grouped).forEach(psName => {
                    html += `
                        <div class="ps-header" onclick="togglePS(this)">
                            <span>🚨 ${psName} Police Station</span>
                            <span class="ps-icon">▼</span>
                        </div>
                        <div class="ps-content">
                            ${grouped[psName].map(p => createCard(p)).join('')}
                        </div>`;
                });
            } else {
                html = shopData[key].partners.map(p => createCard(p)).join('');
            }
            
            section.innerHTML = html;
            allHtml += html;
            contentArea.appendChild(section);
        });
        
        dirSection.innerHTML = allHtml;
        contentArea.prepend(dirSection);

        document.getElementById('globalSearch').onkeyup = globalFilter;
    }

    function createTab(text, id, active) {
        const btn = document.createElement('button');
        btn.className = `tab-btn ${active ? 'active' : ''}`;
        btn.innerText = text;
        btn.onclick = (e) => showSection(id, e.target);
        document.getElementById('tabMenu').appendChild(btn);
    }

    function createCard(p) {
        let forceType = (p.force_type || 'Officer').trim();
        let statusClean = p.status.toLowerCase();
        
        let badgeClass = 'off';
        let badgeText = '⚪ Off Duty';
        
        if (statusClean === 'duty' || statusClean === 'on-duty') {
            badgeClass = 'on';
            badgeText = '🟢 On Duty';
        } else if (statusClean === 'absent') {
            badgeClass = 'absent';
            badgeText = '🔴 Absent';
        }
        
        let trackingDetails = "";
        if (statusClean === 'duty' || statusClean === 'on-duty') {
            trackingDetails = `
                <p style="color:#ff6600; font-weight:bold;">📍 <b>Duty Post:</b> ${p.duty_post}</p>
                <p style="font-size:12px;">🧭 <b>In GPS:</b> ${p.in_gps}</p>
                <p style="font-size:12px; color:#2c3e50;">🕒 <b>Joined At:</b> ${p.in_time}</p>
            `;
        }

        // 🎯 डिस्प्ले के समय कुल सेकंड्स को तोड़कर (Hrs: 0h:0m:0s) दिखाना
        let summaryParts = p.summary.split('|').map(x => x.trim());
        let totalSeconds = parseInt(summaryParts[2].split(':')[1]) || 0;
        let formattedTimeLive = parseSecondsToHMS(totalSeconds);

        return `
            <div class="list-card">
                <span class="status-badge ${badgeClass}">${badgeText}</span>
                <h3 style="color:var(--police-blue); margin-top:0; font-weight:900; font-size: 20px; padding-right: 90px;">${p.name || 'N/A'}</h3>
                <p>🎖️ <b>Rank:</b> ${p.rank || 'N/A'} (${forceType})</p>
                <p>📞 <b>Mobile:</b> ${p.mobile || 'N/A'}</p>
                ${trackingDetails}
                <p style="background:#f1f2f6; padding:5px 10px; border-radius:10px; font-size:12px; font-weight:bold; color:#2f3542;">
                    📊 <b>Attendance Record:</b> ${summaryParts[0]} | ${summaryParts[1]} | <b>Hrs: ${formattedTimeLive}</b>
                </p>
                <div class="btn-group">
                    <a href="tel:${p.mobile}" class="action-btn">📞 CALL</a>
                    ${p.landline ? `<a href="tel:${p.landline}" class="action-btn">☎️ LANDLINE</a>` : ""}
                    <a href="https://wa.me/${p.whatsapp}" class="action-btn">💬 WHATSAPP</a>
                </div>
            </div>`;
    }

    function toggleNightMode() {
        document.body.classList.toggle('night-mode');
        const isNight = document.body.classList.contains('night-mode');
        localStorage.setItem('theme', isNight ? 'night' : 'light');
        updateModeButton(isNight);
    }
    function updateModeButton(isNight) {
        const btn = document.getElementById('modeBtn');
        if (btn) btn.innerHTML = isNight ? "☀️ LIGHT MODE" : "🌙 NIGHT MODE";
    }
    function toggleModal(id) {
        const m = document.getElementById(id);
        if (m) m.style.display = (m.style.display === "block") ? "none" : "block";
    }
    function changeZoom(delta) {
        let currentZoom = parseFloat(document.body.style.zoom) || 1.0;
        currentZoom += delta;
        document.body.style.zoom = Math.min(Math.max(currentZoom, 0.8), 1.5);
    }
    function goHome() { location.reload(); }
    
    function togglePS(header) {
        const content = header.nextElementSibling;
        const icon = header.querySelector('.ps-icon');
        if (content.classList.contains('open')) {
            content.classList.remove('open');
            icon.innerText = '▼';
        } else {
            content.classList.add('open');
            icon.innerText = '▲';
        }
    }
    
    function showSection(id, btn) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        const target = document.getElementById(id);
        if (target) target.classList.add('active');
        btn.classList.add('active');
        btn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
    }
    
    function globalFilter() {
        const term = document.getElementById('globalSearch').value.toLowerCase();
        const activeSection = document.querySelector('.section.active');
        if (activeSection) {
            const cards = activeSection.querySelectorAll('.list-card');
            cards.forEach(card => {
                const isMatch = card.innerText.toLowerCase().includes(term);
                card.style.display = isMatch ? "block" : "none";
            });
        }
    }
</script>
